StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = Base

Packages = write-good, alex, proselint

[*.md]
BasedOnStyles = Vale, write-good, alex, proselint

# Bans the verb "to be" outright - not practical for technical/API docs that
# routinely say "is", "are", "was".
write-good.E-Prime = NO
# This is fraud-monitoring/PII software: "fraud", "execute", "failed" are
# necessary domain vocabulary, not profanity.
alex.ProfanityUnlikely = NO
alex.ProfanityLikely = NO
# Near-100% false-positive rate here: "master list" / "MasterRow" are this
# project's actual data-modeling terms (see CLAUDE.md), unrelated to the
# master/slave sense the rule targets.
alex.Race = NO
